        - generic [ref=e98]:
          - 'heading "Home Renovation Costs in 2026: Budget by Room, Materials and Scope" [level=2] [ref=e99]'
          - blockquote [ref=e100]:
            - paragraph [ref=e101]: "Short answer: in 2026, the safest renovation budget is not a single cost-per-square-foot number. Build it by scope, room, materials, labor, permits, contingencies and the cost of decisions you postpone."
          - figure "Home renovation budget planning" [ref=e103]:
            - img "Home renovation budget planning" [ref=e104]
            - generic [ref=e105]: Home renovation budget planning
          - paragraph [ref=e106]: Renovation prices vary sharply between the US, Canada, the UK, Australia and Europe. They also vary by city, labor availability, building age, permit requirements and whether you are renovating a condo, apartment, townhouse or detached home. The useful question is not "what is the average renovation cost?" The useful question is "what scope am I actually buying?"
          - paragraph [ref=e107]: This guide is written for Western homeowners planning a practical 2026 remodel. It uses current market context from Harvard JCHS, Houzz, NAR, ASID, Zonda, GOV.UK and homeowner research, then turns that into a budget framework you can use before requesting quotes.
          - heading "2026 market context" [level=2] [ref=e108]
          - paragraph [ref=e109]:
            - text: Renovation demand is not disappearing. The
            - link "Harvard Joint Center for Housing Studies LIRA update" [ref=e110] [cursor=pointer]:
              - /url: https://www.jchs.harvard.edu/press-releases/remodeling-growth-set-downshift-late-2026
            - text: projects US homeowner improvement and maintenance spending to keep growing through 2026, even if growth slows later in the year. That means contractors may be more available than in peak overheated periods, but labor and materials are not suddenly cheap.
          - paragraph [ref=e111]:
            - text: Homeowners are also renovating because moving is expensive. The
            - link "2026 State of American Home Renovation report" [ref=e112] [cursor=pointer]:
              - /url: https://www.greatdayimprovements.com/home-advice/american-home-renovation-report/2026/
            - text: found that cost remains a major obstacle, but many homeowners still plan meaningful projects. The same report notes that high costs, time pressure and finding trusted professionals are major barriers, which matches what many people feel before a kitchen, bathroom or whole-home remodel.
          - paragraph [ref=e113]:
            - text: In the UK, official material data also shows that costs are not flat. The GOV.UK
            - link "construction building materials commentary for March 2026" [ref=e114] [cursor=pointer]:
              - /url: https://www.gov.uk/government/statistics/building-materials-and-components-statistics-march-2026/construction-building-materials-commentary-march-2026
            - text: reported that the "All Work" material price index was up year over year in February 2026, with repair and maintenance also higher.
          - heading "Quick budget ranges" [level=2] [ref=e115]
          - paragraph [ref=e116]: Use these as planning ranges, not quotes. Local bids can land outside them.
          - paragraph [ref=e117]: "| Scope | Typical US planning range | What it usually includes | | --- | ---: | --- | | Cosmetic refresh | $20-$75 per sq ft | Paint, simple flooring, lighting swaps, hardware, minor repairs | | Midrange renovation | $75-$200 per sq ft | Better flooring, kitchen or bath updates, electrical changes, surface prep | | Major gut remodel | $200-$450+ per sq ft | Layout changes, MEP work, structural coordination, higher labor, permits | | High-end custom work | $450+ per sq ft | Custom millwork, premium stone, complex lighting, specialty trades |"
          - paragraph [ref=e118]: For the UK, Canada, Australia and Europe, use the same scope logic but replace the unit prices with local contractor quotes and official material/labor data. The mistake is using a national average for a local building.
          - heading "Room-by-room budget priorities" [level=2] [ref=e119]
          - figure "Renovation material samples and room planning" [ref=e121]:
            - img "Renovation material samples and room planning" [ref=e122]
            - generic [ref=e123]: Renovation material samples and room planning
          - paragraph [ref=e124]: Kitchens and bathrooms carry the highest risk because they combine design, plumbing, electrical, ventilation, waterproofing and expensive fixtures. Bedrooms and living rooms are easier to phase.
          - paragraph [ref=e125]: "| Area | Budget pressure | Why it costs more than expected | | --- | --- | --- | | Kitchen | Very high | Cabinets, countertops, appliances, lighting, outlets, plumbing, layout decisions | | Bathroom | Very high | Waterproofing, tile, plumbing, ventilation, shower glass, accessibility | | Living areas | Medium | Flooring, surface prep, lighting, built-ins, paint quality | | Entry and hallway | Medium | Durable flooring, storage, doors, trim, lighting controls | | Exterior / envelope | High but strategic | Windows, doors, siding, insulation, water management, resale value | | Hidden work | High risk | Electrical, plumbing, HVAC, framing, subfloor, code upgrades |"
          - paragraph [ref=e126]:
            - text: "If you plan to stay in the home for years, spend first on comfort, durability and maintenance. If you may sell soon, compare project value: Zonda's"
            - link "2025 Cost vs. Value Report" [ref=e127] [cursor=pointer]:
              - /url: https://zondahome.com/2025-cost-vs-value-report/
            - text: shows that some replacement and curb-appeal projects can retain more resale value than large discretionary interior remodels.
          - 'heading "Kitchen costs: where the money goes" [level=2] [ref=e128]'
          - paragraph [ref=e129]:
            - text: Kitchen renovation remains one of the biggest interior expenses. Houzz's
            - link "2026 U.S. Kitchen Trends Study" [ref=e130] [cursor=pointer]:
              - /url: https://www.houzz.com/magazine/2026-u-s-houzz-kitchen-trends-study-stsetivw-vs~184213864
            - text: "is useful because it is based on homeowners who are renovating or planning kitchen projects, not only designer mood boards. The study points toward practical kitchens: storage, layout, built-in features, warmer materials and function."
          - paragraph [ref=e131]:
            - text: NAR's 2026 kitchen trend analysis also emphasizes
            - link "smarter layouts, built-in storage and warm materials" [ref=e132] [cursor=pointer]:
              - /url: https://www.nar.realtor/blogs/styled-staged-sold/designing-a-kitchen-in-2026-six-trends-to-watch
            - text: . For budgeting, that means the expensive part is not only "style." It is cabinets, drawers, pull-outs, appliances, lighting layers, electrical capacity and installation.
          - paragraph [ref=e133]: "Kitchen budget rule:"
          - list [ref=e134]:
            - listitem [ref=e135]: Keep the footprint if possible.
            - listitem [ref=e136]: Decide appliances before electrical and cabinetry.
            - listitem [ref=e137]: Choose cabinet construction before choosing door color.
            - listitem [ref=e138]: Use a durable countertop you can maintain.
            - listitem [ref=e139]: Do not order cabinets until final measurements are confirmed.
            - listitem [ref=e140]: Keep 10-15% of the kitchen budget for install details and fixes.
          - 'heading "Bathroom costs: why small rooms get expensive" [level=2] [ref=e141]'
          - paragraph [ref=e142]:
            - text: A bathroom can be tiny and still costly. It has water, tile, ventilation, waterproofing, drains, lighting, storage, glass and sometimes heated floors. The 2026 direction is less about flashy luxury and more about daily comfort, aging-in-place and wellness. ASID's
            - link "2026 Trends Outlook" [ref=e143] [cursor=pointer]:
              - /url: https://www.asid.org/news/asid-releases-2026-trends-outlook-report
            - text: frames interior design around wellness, technology, long-term use and changing lifestyles.
          - paragraph [ref=e144]: "Bathroom budget rule:"
          - list [ref=e145]:
            - listitem [ref=e146]: Never skip waterproofing.
            - listitem [ref=e147]: Keep access panels for valves and service points.
            - listitem [ref=e148]: Plan ventilation before finishes.
            - listitem [ref=e149]: Use slip-resistant flooring.
            - listitem [ref=e150]: Decide shower niche, glass and drain location early.
            - listitem [ref=e151]: If the home is long-term, consider blocking for future grab bars even if you do not install them now.
          - heading "Hidden costs that break budgets" [level=2] [ref=e152]
          - figure "Clean rough-in stage of a renovation" [ref=e154]:
            - img "Clean rough-in stage of a renovation" [ref=e155]
            - generic [ref=e156]: Clean rough-in stage of a renovation
          - paragraph [ref=e157]: The visible finish is rarely the main budget risk. Hidden work is.
          - paragraph [ref=e158]: "Common hidden costs:"
          - list [ref=e159]:
            - listitem [ref=e160]: electrical panel upgrades;
            - listitem [ref=e161]: old plumbing replacement;
            - listitem [ref=e162]: asbestos, lead paint or mold remediation in older homes;
            - listitem [ref=e163]: subfloor leveling;
            - listitem [ref=e164]: structural corrections;
            - listitem [ref=e165]: permit revisions;
            - listitem [ref=e166]: HVAC changes;
            - listitem [ref=e167]: delivery, storage and debris removal;
            - listitem [ref=e168]: temporary kitchen or temporary housing;
            - listitem [ref=e169]: change orders from late decisions.
          - paragraph [ref=e170]: For a narrow, planned project, keep a 10-15% contingency. For an older home, a condo with strict building rules or a gut renovation, use 20-30%.
          - heading "What to spend on first" [level=2] [ref=e171]
          - paragraph [ref=e172]: "Spend on the work that is hard to change later:"
          - list [ref=e173]:
            - listitem [ref=e174]: electrical capacity and safe circuits;
            - listitem [ref=e175]: plumbing and shutoff access;
            - listitem [ref=e176]: waterproofing;
            - listitem [ref=e177]: insulation and air sealing where relevant;
            - listitem [ref=e178]: windows, exterior doors and moisture control;
            - listitem [ref=e179]: subfloor and wall preparation;
            - listitem [ref=e180]: lighting plan;
            - listitem [ref=e181]: kitchen measurements and cabinet layout.
          - paragraph [ref=e182]: "Save on things that can be upgraded later:"
          - list [ref=e183]:
            - listitem [ref=e184]: decorative light fixtures;
            - listitem [ref=e185]: loose furniture;
            - listitem [ref=e186]: some hardware;
            - listitem [ref=e187]: paint color changes;
            - listitem [ref=e188]: nonessential built-ins;
            - listitem [ref=e189]: premium tile in low-impact areas;
            - listitem [ref=e190]: smart home devices that do not affect wiring or safety.
          - paragraph [ref=e191]:
            - text: If you are remodeling a small home or apartment, pair this guide with our
            - link "small apartment trends 2026" [ref=e192] [cursor=pointer]:
              - /url: /en/posts/small-apartment-trends-2026
            - text: and
            - link "renovation without rework" [ref=e193] [cursor=pointer]:
              - /url: /en/posts/renovation-without-rework-2026
            - text: guides. For material calculations, use the
            - link "laminate and LVT calculator guide" [ref=e194] [cursor=pointer]:
              - /url: /en/posts/how-to-calculate-laminate-and-lvt
            - text: and
            - link "floor screed guide" [ref=e195] [cursor=pointer]:
              - /url: /en/posts/how-to-calculate-floor-screed
            - text: .
          - heading "A practical budget template" [level=2] [ref=e196]
          - paragraph [ref=e197]: "Use this structure before talking to contractors:"
          - paragraph [ref=e198]: "| Line item | Planning share | Notes | | --- | ---: | --- | | Labor | 35-55% | Varies by region and trade availability | | Rough materials | 10-20% | Lumber, drywall, compound, wiring, plumbing, fasteners | | Finish materials | 15-30% | Flooring, tile, paint, trim, counters, fixtures | | Cabinets and millwork | 10-25% | Can dominate kitchen-heavy projects | | Appliances and fixtures | 5-20% | Depends on kitchen, laundry and bath scope | | Permits and professional fees | 2-12% | Higher with structural work, additions or historic rules | | Logistics and cleanup | 3-8% | Delivery, storage, dumpsters, protection | | Contingency | 10-30% | Use the higher end for older homes |"
          - paragraph [ref=e199]: "The formula:"
          - code [ref=e201]: Real renovation budget = contractor scope + owner-purchased items + permits + temporary living costs + logistics + contingency
          - paragraph [ref=e202]: The most common budgeting mistake is comparing one contractor's "labor and rough materials" quote with another contractor's "turnkey" quote. Before comparing prices, normalize the scope.
          - heading "Questions to ask before accepting a quote" [level=2] [ref=e203]
          - list [ref=e204]:
            - listitem [ref=e205]: What is included and excluded?
            - listitem [ref=e206]: Are permits included?
            - listitem [ref=e207]: Who buys finish materials?
            - listitem [ref=e208]: What happens if the subfloor, wiring or plumbing is worse than expected?
            - listitem [ref=e209]: What is the payment schedule?
            - listitem [ref=e210]: How are change orders priced?
            - listitem [ref=e211]: Who handles debris removal?
            - listitem [ref=e212]: How long will the kitchen or bathroom be unusable?
            - listitem [ref=e213]: What warranty is provided?
            - listitem [ref=e214]: What decisions must be finalized before work starts?
          - heading "Sources and market context" [level=2] [ref=e215]
