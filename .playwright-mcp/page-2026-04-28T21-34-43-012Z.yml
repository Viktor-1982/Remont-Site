                - cell "Высокий" [ref=e130]
                - cell "Работы, материалы, мебель, техника, свет, текстиль, монтаж" [ref=e131]
                - cell "Нужен готовый результат без отдельного сбора всех позиций" [ref=e132]
          - paragraph [ref=e133]: "Главное правило: цена \"за квадрат\" не должна быть единственной цифрой в смете. Ванная, кухня, электрика, сантехника и мебель могут резко изменить итог даже при небольшой площади."
          - heading "Почему ремонт выходит дороже ожиданий" [level=2] [ref=e134]
          - paragraph [ref=e135]: "Обычно бюджет растет не из-за одного дорогого материала, а из-за суммы мелких решений:"
          - list [ref=e136]:
            - listitem [ref=e137]: не учли доставку, подъем и хранение материалов;
            - listitem [ref=e138]: "забыли расходники: грунтовки, крепеж, смеси, ленты, герметики, мешки;"
            - listitem [ref=e139]: поменяли проект кухни после разводки электрики;
            - listitem [ref=e140]: купили плитку без запаса;
            - listitem [ref=e141]: не заложили выравнивание стен и пола;
            - listitem [ref=e142]: пришлось менять трубы, щиток или проводку;
            - listitem [ref=e143]: появились скрытые дефекты после демонтажа;
            - listitem [ref=e144]: часть материалов докупали срочно и дороже;
            - listitem [ref=e145]: подрядчик дал цену без чистовых материалов или без комплектации.
          - paragraph [ref=e146]: Поэтому хорошая смета должна быть не красивой таблицей, а рабочим документом. В ней видно, что уже выбрано, что еще под вопросом, где есть риск и какой резерв остается.
          - heading "Смета по комнатам" [level=2] [ref=e147]
          - paragraph [ref=e148]: "Ремонт удобнее считать не только по метрам, но и по зонам. Одна спальня и одна ванная могут занимать похожую площадь, но ванная почти всегда дороже: там больше инженерки, влагозащиты, плитки, сантехники и точных монтажных работ."
          - figure "Материалы и смета по комнатам" [ref=e150]:
            - img "Материалы и смета по комнатам" [ref=e151]
            - generic [ref=e152]: Материалы и смета по комнатам
          - table [ref=e153]:
            - rowgroup [ref=e154]:
              - row "Зона Примерная доля бюджета Что съедает деньги" [ref=e155]:
                - columnheader "Зона" [ref=e156]
