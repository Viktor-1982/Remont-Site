                - cell "Резерв" [ref=e247]
                - cell "15-25%" [ref=e248]
                - cell "Не тратить в начале ремонта" [ref=e249]
          - paragraph [ref=e250]: Если квартира старая, резерв лучше держать ближе к 25%. Если это понятная новостройка с нормальной черновой отделкой, можно начинать с 15-20%, но только после осмотра стен, пола, электрики и мокрых зон.
          - heading "Где нельзя экономить" [level=2] [ref=e251]
          - figure "Черновой этап ремонта и инженерные работы" [ref=e253]:
            - img "Черновой этап ремонта и инженерные работы" [ref=e254]
            - generic [ref=e255]: Черновой этап ремонта и инженерные работы
          - paragraph [ref=e256]: "Есть зоны, где экономия почти всегда возвращается переделками:"
          - list [ref=e257]:
            - listitem [ref=e258]: "электрика: щит, автоматы, кабель, количество линий, розетки под кухню и технику;"
            - listitem [ref=e259]: "сантехника: трубы, коллекторы, фильтры, инсталляция, ревизионный доступ;"
            - listitem [ref=e260]: гидроизоляция ванной и мокрых зон;
            - listitem [ref=e261]: подготовка стен и пола;
            - listitem [ref=e262]: вентиляция;
            - listitem [ref=e263]: замеры и проект кухни;
            - listitem [ref=e264]: стяжка и основание под напольное покрытие;
            - listitem [ref=e265]: герметизация узлов и примыканий;
            - listitem [ref=e266]: доступ к скрытым коммуникациям.
          - paragraph [ref=e267]: Самая дорогая ошибка - закрыть проблемную инженерку красивой отделкой. На фото ремонт уже выглядит почти готовым, но через год приходится вскрывать плитку, пол или потолок.
          - heading "Где можно сэкономить" [level=2] [ref=e268]
          - paragraph [ref=e269]: Экономия работает, если она не ломает надежность.
          - paragraph [ref=e270]: "Хорошие варианты:"
          - list [ref=e271]:
            - listitem [ref=e272]: оставить планировку, если перенос стен не дает реальной пользы;
            - listitem [ref=e273]: использовать качественную краску вместо сложных декоративных покрытий;
            - listitem [ref=e274]: выбрать материалы среднего сегмента без переплаты за бренд;
            - listitem [ref=e275]: "делать шкафы поэтапно: сначала кухня и прихожая, потом остальные зоны;"
            - listitem [ref=e276]: купить часть светильников позже, но заранее заложить выводы под них;
            - listitem [ref=e277]: выбрать простые двери и фурнитуру без сложного декора;
            - listitem [ref=e278]: отказаться от редких форматов плитки, если они усложняют подрезку и монтаж;
            - listitem [ref=e279]: заранее сравнить несколько смет в одинаковой структуре.
          - paragraph [ref=e280]: "Плохая экономия:"
          - list [ref=e281]:
            - listitem [ref=e282]: брать самую дешевую бригаду без договора;
            - listitem [ref=e283]: покупать плитку без запаса;
            - listitem [ref=e284]: менять проект кухни после электрики;
            - listitem [ref=e285]: закрывать трубы без ревизионного доступа;
            - listitem [ref=e286]: не делать гидроизоляцию;
            - listitem [ref=e287]: покупать материалы "примерно", без расчета;
            - listitem [ref=e288]: тратить резерв на декор в начале ремонта.
          - heading "Как сравнивать сметы подрядчиков" [level=2] [ref=e289]
          - paragraph [ref=e290]: Сметы нельзя сравнивать только по итоговой сумме. Две цифры могут выглядеть одинаково, но включать разный объем.
          - paragraph [ref=e291]: "Проверьте:"
          - list [ref=e292]:
            - listitem [ref=e293]: включены ли демонтаж и вывоз мусора;
            - listitem [ref=e294]: кто покупает черновые материалы;
            - listitem [ref=e295]: есть ли электрика и сантехника в полном объеме;
            - listitem [ref=e296]: указаны ли единицы измерения и количество;
            - listitem [ref=e297]: входит ли подготовка стен под выбранную отделку;
            - listitem [ref=e298]: включены ли доставка и подъем;
            - listitem [ref=e299]: есть ли гарантия;
            - listitem [ref=e300]: как считаются дополнительные работы;
            - listitem [ref=e301]: прописаны ли этапы оплаты;
            - listitem [ref=e302]: что считается завершением этапа.
          - paragraph [ref=e303]: Если в смете написано "ремонт под ключ", это еще не значит, что там есть мебель, техника, свет, шторы, декор, доставка и монтаж. Слово "под ключ" нужно расшифровывать построчно.
          - heading "Частые скрытые расходы" [level=2] [ref=e304]
          - paragraph [ref=e305]: "Именно эти позиции чаще всего всплывают уже после старта:"
          - list [ref=e306]:
            - listitem [ref=e307]: дополнительные мешки смесей;
            - listitem [ref=e308]: подъем тяжелых материалов;
            - listitem [ref=e309]: повторная доставка из-за недозаказа;
            - listitem [ref=e310]: выравнивание пола;
            - listitem [ref=e311]: усиление стен под навесную мебель;
            - listitem [ref=e312]: перенос розеток;
            - listitem [ref=e313]: новые автоматы в щитке;
            - listitem [ref=e314]: замена старых труб;
            - listitem [ref=e315]: ревизионные люки;
            - listitem [ref=e316]: пороги, плинтусы, доборы, наличники;
            - listitem [ref=e317]: герметики, уголки, профили;
            - listitem [ref=e318]: временное хранение мебели;
            - listitem [ref=e319]: уборка после ремонта.
          - paragraph [ref=e320]: Чтобы не потерять контроль, заведите отдельную строку "мелкие расходы". Она выглядит незначительной, но в реальном ремонте быстро набирает ощутимую сумму.
          - heading "Мини-чеклист перед стартом" [level=2] [ref=e321]
          - list [ref=e322]:
            - listitem [ref=e323]: Есть обмерный план квартиры.
            - listitem [ref=e324]: Понятно, какие стены и коммуникации нельзя трогать.
            - listitem [ref=e325]: Выбраны основные чистовые материалы.
            - listitem [ref=e326]: Кухня спроектирована до разводки электрики.
            - listitem [ref=e327]: Для ванной выбраны сантехника, смесители, плитка и схема раскладки.
            - listitem [ref=e328]: В смете есть доставка, подъем, расходники и вывоз мусора.
            - listitem [ref=e329]: В договоре указаны этапы, сроки, гарантия и порядок оплаты.
            - listitem [ref=e330]: Есть отдельный резерв 15-25%.
            - listitem [ref=e331]: Все спорные решения зафиксированы письменно.
            - listitem [ref=e332]: Понятно, кто закупает материалы и кто отвечает за ошибки в количестве.
          - heading "Итог" [level=2] [ref=e333]
          - paragraph [ref=e334]: Хорошая смета ремонта - это не попытка угадать идеальную цену. Это способ заранее увидеть риски. Сначала считайте ремонт по сценариям, затем по комнатам, потом по статьям расходов. Не смешивайте работы, материалы, мебель и резерв в одну общую цифру.
          - paragraph [ref=e335]: Если бюджет ограничен, вкладывайтесь в инженерку, мокрые зоны, основание пола, подготовку стен и продуманную электрику. Декор можно заменить позже. Переделывать скрытые работы всегда дороже.
