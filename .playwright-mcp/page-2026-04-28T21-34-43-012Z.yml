                - cell "Резерв" [ref=e181]
                - cell "15-25%" [ref=e182]
                - cell "Скрытые дефекты, переделки, рост цен, срочные замены" [ref=e183]
          - paragraph [ref=e184]: Если бюджет ограничен, сначала фиксируйте ванную, электрику, сантехнику, черновые полы и стены. Декор, часть мебели, текстиль и отдельные светильники можно докупить позже. Плохая идея - экономить на скрытых работах ради дорогих фасадов или декоративных покрытий.
          - heading "Как посчитать ремонт квартиры" [level=2] [ref=e185]
          - paragraph [ref=e186]: "Начните с базовой формулы:"
          - code [ref=e188]: Итоговый бюджет = работы + черновые материалы + чистовые материалы + инженерка + мебель и техника + доставка + вывоз мусора + резерв
          - paragraph [ref=e189]: "Затем разложите ее по комнатам:"
          - code [ref=e191]: Бюджет комнаты = подготовка + отделка стен + пол + потолок + электрика + двери + свет + мебель + резерв
          - paragraph [ref=e192]: "Для кухни добавьте:"
          - list [ref=e193]:
            - listitem [ref=e194]: гарнитур;
            - listitem [ref=e195]: столешницу;
            - listitem [ref=e196]: фартук;
            - listitem [ref=e197]: технику;
            - listitem [ref=e198]: мойку и смеситель;
            - listitem [ref=e199]: дополнительные розетки;
            - listitem [ref=e200]: подсветку рабочей зоны;
            - listitem [ref=e201]: монтаж и подключение.
          - paragraph [ref=e202]: "Для ванной добавьте:"
          - list [ref=e203]:
            - listitem [ref=e204]: гидроизоляцию;
            - listitem [ref=e205]: плитку и запас;
            - listitem [ref=e206]: сантехнику;
            - listitem [ref=e207]: инсталляцию или унитаз;
            - listitem [ref=e208]: душевую зону или ванну;
            - listitem [ref=e209]: смесители;
            - listitem [ref=e210]: вентиляцию;
            - listitem [ref=e211]: ревизионные люки;
            - listitem [ref=e212]: теплый пол, если он нужен.
          - heading "Пример распределения бюджета" [level=2] [ref=e213]
          - paragraph [ref=e214]: "Допустим, весь ремонтный бюджет принят за 100%. Тогда разумное распределение может выглядеть так:"
          - table [ref=e215]:
