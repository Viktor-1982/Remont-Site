          - 'heading "Сколько стоит ремонт квартиры в 2026 году: как рассчитать бюджет без лишних трат" [level=2] [ref=e99]'
          - blockquote [ref=e100]:
            - paragraph [ref=e101]: "Кратко: ремонт в 2026 году лучше считать не одной ценой за квадратный метр, а набором сценариев. Отдельно закладывайте работы, черновые материалы, чистовую отделку, инженерку, мебель, доставку, вывоз мусора и резерв. Именно забытые статьи расходов чаще всего ломают бюджет."
          - figure "Планирование бюджета ремонта квартиры" [ref=e103]:
            - img "Планирование бюджета ремонта квартиры" [ref=e104]
            - generic [ref=e105]: Планирование бюджета ремонта квартиры
          - paragraph [ref=e106]: Универсальной цены ремонта не существует. Одинаковая квартира может стоить по-разному из-за состояния стен и пола, количества мокрых зон, сложности электрики, уровня материалов, сроков, доступности мастеров и требований дома. Поэтому задача владельца не угадать точную сумму с первой попытки, а собрать реалистичную вилку и понять, где деньги действительно нужны.
          - paragraph [ref=e107]: "В 2026 году ремонт стоит считать как проект. Не \"комната плюс обои\", а последовательность решений: демонтаж, черновые работы, инженерные системы, чистовая отделка, мебель, техника, свет, доставка, подъем, хранение, вывоз мусора и непредвиденные работы."
          - heading "Быстрый ориентир по бюджету" [level=2] [ref=e108]
          - paragraph [ref=e109]: Для первого расчета удобно разделить ремонт на три сценария. Вместо привязки к конкретной стране или валюте используйте цену за квадратный метр в своем городе и проверяйте ее по 3-5 предложениям подрядчиков.
          - table [ref=e110]:
            - rowgroup [ref=e111]:
