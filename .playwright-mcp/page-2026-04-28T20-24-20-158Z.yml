        - generic [ref=e99]:
          - 'heading "Сколько стоит ремонт квартиры в 2026 году: смета для России, Беларуси и Казахстана" [level=2] [ref=e100]'
          - blockquote [ref=e101]:
            - paragraph [ref=e102]: "Кратко: в 2026 году ремонт лучше считать не одной ценой за квадратный метр, а тремя сценариями: косметика, капитальный ремонт и ремонт с полной комплектацией. Для России, Беларуси и Казахстана логика одинаковая, но валюта, стоимость труда, импортные позиции и доступность бригад отличаются."
          - figure "Планирование бюджета ремонта квартиры" [ref=e104]:
            - img "Планирование бюджета ремонта квартиры" [ref=e105]
            - generic [ref=e106]: Планирование бюджета ремонта квартиры
          - paragraph [ref=e107]: Эта статья не заменяет локальную смету подрядчика. Официальная статистика обычно показывает индексы цен в строительстве и динамику материалов, а не готовую цену ремонта квартиры под ключ. Поэтому правильная задача владельца квартиры - собрать вилку бюджета, проверить ее по рынку своего города и заранее заложить резерв.
          - paragraph [ref=e108]:
            - text: "В 2026 году особенно важно считать ремонт как проект: отдельно черновые работы, инженерку, чистовые материалы, мебель, доставку, подъем, хранение и непредвиденные работы. Если нужна общая последовательность этапов, начните с нашего"
            - link "плана ремонта квартиры 2026" [ref=e109] [cursor=pointer]:
              - /url: /posts/remont-kvartiry-plan-2026
            - text: ", а затем возвращайтесь к смете."
          - heading "Быстрый ориентир по бюджету" [level=2] [ref=e110]
          - paragraph [ref=e111]: Ниже - стартовые вилки для первичного планирования. Они подходят для квартиры без элитных материалов, сложной перепланировки и дизайнерского авторского надзора.
          - paragraph [ref=e112]: "| Сценарий | Россия, ₽/м² | Беларусь, BYN/м² | Казахстан, ₸/м² | Когда подходит | | --- | ---: | ---: | ---: | --- | | Косметическое обновление | 25 000-50 000 | 800-1 600 | 150 000-300 000 | Покраска, обои, частичная замена пола, свет, мелкий ремонт | | Капитальный ремонт | 55 000-95 000 | 1 700-3 200 | 330 000-570 000 | Демонтаж, стены, полы, электрика, сантехника, ванная | | Под ключ с комплектацией | 100 000-160 000+ | 3 200-5 500+ | 600 000-950 000+ | Ремонт, мебель, техника, свет, двери, текстиль, монтаж |"
          - paragraph [ref=e113]: Эти диапазоны нужно корректировать по городу. Москва, Санкт-Петербург, Минск, Астана и Алматы обычно ближе к верхней границе. Малые города могут быть дешевле по работам, но дороже по доставке, выбору материалов и срокам.
          - heading "Почему ремонт стал дороже" [level=2] [ref=e114]
          - paragraph [ref=e115]:
            - text: "В России рыночные оценки на начало 2026 года сходятся в одном: ремонт дорожает не только из-за материалов, но и из-за стоимости работ. Например,"
            - link "Лента со ссылкой на Welcome 24" [ref=e116] [cursor=pointer]:
              - /url: https://lenta.ru/news/2026/03/25/stoimost-remonta-kvartiry-v-2026-godu-podschitali/
            - text: писала, что капитальный ремонт жилья в 2026 году может вырасти на 25-30% относительно 2025 года, а минимальный бюджет ремонта квартиры оценивался примерно от 1,9 млн рублей.
          - paragraph [ref=e117]:
            - text: Официальные индексы подтверждают, что строительная часть остается под ценовым давлением. В России
            - link "Росстат по индексу цен производителей за март 2026 года" [ref=e118] [cursor=pointer]:
              - /url: https://rosstat.gov.ru/storage/mediabank/56_22-04-2026.html
            - text: "фиксировал рост промышленных цен, а в потребительских данных по февралю 2026 года отдельной строкой отражались строительные материалы. Для Казахстана полезнее смотреть не рекламные прайсы, а публикации Бюро национальной статистики: на странице"
            - link "индексов цен и цен в строительстве" [ref=e119] [cursor=pointer]:
              - /url: https://stat.gov.kz/ru/industries/economy/prices/spreadsheets/?name=19094
            - text: "есть релизы за январь, февраль и март 2026 года. Для Беларуси важно учитывать, что цены на ресурсы в строительстве регулируются и мониторятся через нормативную базу: постановление о порядке мониторинга цен на материалы для строительства описано в"
            - link "документе Минстройархитектуры РБ от 21 января 2026 года" [ref=e120] [cursor=pointer]:
              - /url: https://prg.kz/document/?doc_id=33500237
            - text: .
          - paragraph [ref=e121]: "Вывод простой: не стоит переносить смету 2024-2025 года в 2026 без индексации. Даже если плитка или краска не подорожали резко, работа мастеров, доставка, электрика, сантехника и мебель могут сдвинуть итог на сотни тысяч рублей."
          - heading "Смета по комнатам" [level=2] [ref=e122]
          - paragraph [ref=e123]: "Ремонт квартиры удобнее считать не только по метрам, но и по зонам. Ванная и кухня почти всегда дороже жилой комнаты: там больше инженерки, влагозащиты, плитки, сантехники, техники и точных монтажных работ."
          - figure "Материалы и смета по комнатам" [ref=e125]:
            - img "Материалы и смета по комнатам" [ref=e126]
            - generic [ref=e127]: Материалы и смета по комнатам
          - paragraph [ref=e128]: "| Зона | Доля бюджета | Что съедает деньги | | --- | ---: | --- | | Ванная и санузел | 18-30% | Гидроизоляция, плитка, сантехника, инсталляция, теплый пол, вентиляция | | Кухня | 20-35% | Электрика, фартук, техника, столешница, гарнитур, освещение | | Жилые комнаты | 20-30% | Стены, пол, потолок, двери, свет, встроенное хранение | | Коридор и прихожая | 8-15% | Износостойкий пол, шкафы, двери, электрика, свет | | Доставка, подъем, расходники | 5-10% | Логистика, мешки, грунтовки, крепеж, инструмент, вывоз мусора | | Резерв | 15-25% | Скрытые дефекты, переделки, замена коммуникаций, рост цен |"
          - paragraph [ref=e129]:
            - text: Если бюджет ограничен, сначала зафиксируйте ванную, электрику, сантехнику, черновые полы и стены. Декор, часть мебели, текстиль и отдельные светильники можно докупить позже. Эта логика подробно раскрыта в статье
            - link "ремонт без переделок в 2026" [ref=e130] [cursor=pointer]:
              - /url: /posts/remont-bez-peredelok-2026
            - text: .
          - 'heading "Россия: как считать" [level=2] [ref=e131]'
          - paragraph [ref=e132]: "Для России разумная схема такая: сначала считать в рублях за квадратный метр, затем отдельно добавлять мебель, технику и нестандартные работы."
          - paragraph [ref=e133]: "Пример для квартиры 50 м²:"
          - paragraph [ref=e134]: "| Сценарий | Работы и материалы | Комплектация | Резерв | Итого | | --- | ---: | ---: | ---: | ---: | | Косметика | 1,25-2,5 млн ₽ | 300-700 тыс. ₽ | 250-500 тыс. ₽ | 1,8-3,7 млн ₽ | | Капитальный | 2,75-4,75 млн ₽ | 700 тыс.-1,5 млн ₽ | 500 тыс.-1,2 млн ₽ | 4-7,5 млн ₽ | | Под ключ | 5-8 млн ₽ | включено частично | 1-2 млн ₽ | 6-10 млн ₽ |"
          - paragraph [ref=e135]: "В Москве и Санкт-Петербурге верхняя граница легко растет из-за работы мастеров, сложной логистики, платной парковки, допуска в ЖК, требований управляющей компании и более дорогой комплектации. В регионах ниже ставка труда, но не всегда ниже итог: доставка плитки, дверей, мебели и техники может компенсировать разницу."
          - 'heading "Беларусь: что учесть" [level=2] [ref=e136]'
          - paragraph [ref=e137]: "В Беларуси ремонт стоит считать в BYN, но многие материалы и комплектующие все равно завязаны на импорт, курс и логистику. Для Минска, областных центров и малых городов разница может быть заметной: в Минске выше стоимость работы и спрос на хорошие бригады, в небольших городах меньше выбор материалов и специалистов."
          - paragraph [ref=e138]: "Важный момент: для строительной отрасли в Беларуси действует система мониторинга текущих цен на материалы и формирования нормативной базы. Поэтому официальные индексы и сметная логика полезны как фон, но частный ремонт квартиры все равно нужно проверять по реальным коммерческим предложениям."
          - paragraph [ref=e139]: "Практический ориентир:"
          - list [ref=e140]:
            - listitem [ref=e141]: косметика в жилой комнате может быть относительно доступной, если не трогать электрику и пол;
            - listitem [ref=e142]: ванная почти всегда выбивает смету из среднего уровня;
            - listitem [ref=e143]: заказная мебель и импортная сантехника сильно зависят от курса и сроков поставки;
            - listitem [ref=e144]: старый фонд требует больше резерва из-за стен, труб и электрики.
          - 'heading "Казахстан: что учесть" [level=2] [ref=e145]'
          - paragraph [ref=e146]: В Казахстане сильнее проявляется городская разница. Алматы и Астана обычно дороже по работам, аренде складов, логистике и спросу на качественных мастеров. В других городах часть работ может быть дешевле, но импортные материалы, сантехника, двери и техника могут идти с задержками или ограниченным выбором.
          - paragraph [ref=e147]:
            - text: "Для проверки макрофона используйте данные Бюро национальной статистики: в релизе о строительных работах за январь-март 2026 года отмечался рост объема строительных работ, а"
            - link "публикация по строительству" [ref=e148] [cursor=pointer]:
              - /url: https://stat.gov.kz/ru/industries/business-statistics/stat-inno-build/publications/340984/
            - text: "показывает, что строительная активность остается высокой. Это важно для ремонта: когда рынок занят крупными объектами и новостройками, хорошие бригады для квартир могут быть дороже и расписаны заранее."
          - paragraph [ref=e149]: "Практический ориентир для сметы:"
          - list [ref=e150]:
            - listitem [ref=e151]: считать работы и материалы отдельно, а не брать одну цену "за все";
            - listitem [ref=e152]: уточнять, какие позиции в тенге, а какие привязаны к доллару или евро;
            - listitem [ref=e153]: заранее фиксировать сроки поставки плитки, сантехники, дверей и кухни;
            - listitem [ref=e154]: оставлять резерв минимум 20%, особенно во вторичке.
          - heading "Где нельзя экономить" [level=2] [ref=e155]
          - figure "Черновой этап ремонта и инженерные работы" [ref=e157]:
            - img "Черновой этап ремонта и инженерные работы" [ref=e158]
            - generic [ref=e159]: Черновой этап ремонта и инженерные работы
          - paragraph [ref=e160]: "Есть зоны, где экономия почти всегда возвращается переделками:"
          - list [ref=e161]:
            - listitem [ref=e162]: "электрика: щит, автоматы, кабель, количество линий, розетки под кухню и технику;"
            - listitem [ref=e163]: "сантехника: трубы, коллекторы, фильтры, инсталляция, ревизионный доступ;"
            - listitem [ref=e164]: гидроизоляция ванной и мокрых зон;
            - listitem [ref=e165]: подготовка стен и пола;
            - listitem [ref=e166]: вентиляция;
            - listitem [ref=e167]: замеры и проект кухни;
            - listitem [ref=e168]: стяжка и основание под напольное покрытие.
          - paragraph [ref=e169]:
            - text: "Если делаете полы, сначала проверьте расчеты: у нас есть отдельные материалы про"
            - link "стяжку пола" [ref=e170] [cursor=pointer]:
              - /url: /posts/kak-rasschitat-styazhku-pola
            - text: и
            - link "расчет ламината и кварцвинила" [ref=e171] [cursor=pointer]:
              - /url: /posts/kak-rasschitat-laminat-i-kvarcvinil
            - text: . Ошибка в основании пола часто дороже самой финишной доски.
          - heading "Где можно сэкономить" [level=2] [ref=e172]
          - paragraph [ref=e173]: Экономия работает, если она не ломает инженерку и долговечность.
          - paragraph [ref=e174]: "Хорошие варианты:"
          - list [ref=e175]:
            - listitem [ref=e176]: оставить планировку, если перенос стен не дает реальной пользы;
            - listitem [ref=e177]: использовать краску вместо сложных декоративных покрытий;
            - listitem [ref=e178]: выбрать качественный керамогранит среднего сегмента вместо "премиум ради бренда";
            - listitem [ref=e179]: "делать шкафы поэтапно: сначала кухня и прихожая, потом остальные зоны;"
            - listitem [ref=e180]: часть светильников купить позже, но выводы под них заложить сразу;
            - listitem [ref=e181]: покупать материалы партиями, когда понятно количество и есть место хранения.
          - paragraph [ref=e182]: "Плохая экономия:"
          - list [ref=e183]:
            - listitem [ref=e184]: брать самую дешевую бригаду без договора;
            - listitem [ref=e185]: покупать плитку без запаса;
            - listitem [ref=e186]: менять проект кухни после электрики;
            - listitem [ref=e187]: закрывать трубы без ревизионного доступа;
            - listitem [ref=e188]: не делать гидроизоляцию;
            - listitem [ref=e189]: не закладывать резерв.
          - heading "Формула сметы" [level=2] [ref=e190]
          - paragraph [ref=e191]: "Используйте простую формулу:"
          - code [ref=e193]: Итоговый бюджет = работы + черновые материалы + чистовые материалы + инженерка + мебель и техника + доставка + вывоз мусора + резерв 15-25%
          - paragraph [ref=e194]: Для старой квартиры резерв лучше считать ближе к 25%. Для новостройки с понятной черновой отделкой можно начинать с 15-20%, но только после осмотра стен, пола, электрики и мокрых зон.
          - heading "Мини-чеклист перед стартом" [level=2] [ref=e195]
          - list [ref=e196]:
            - listitem [ref=e197]: Есть обмерный план квартиры.
            - listitem [ref=e198]: Понятно, какие стены и коммуникации нельзя трогать.
            - listitem [ref=e199]: Есть список финишных материалов с артикулами.
            - listitem [ref=e200]: Кухня спроектирована до разводки электрики.
            - listitem [ref=e201]: Для ванной выбраны сантехника, инсталляция, смесители и плитка.
